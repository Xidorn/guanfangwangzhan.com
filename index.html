<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>官方网站</title>
  <meta name="description" content="官方网站（guanfangwangzhan.com）是由王先生搭建的网站。王先生长期专注于网站建设、SEO、SEM 与 GEO 优化，致力于帮助个人与企业提升搜索可见性，获取更多精准流量、询盘机会与业务增长。如需合作，欢迎访问官网 www.wangxiansheng.com 或发送邮件至 lianxi@wangxiansheng.com。" />
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #ffffff;
      color: #111111;
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 680px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-family: "Ma Shan Zheng", "KaiTi", "STKaiti", cursive;
      font-size: clamp(42px, 9vw, 76px);
      font-weight: 400;
      letter-spacing: -0.04em;
      line-height: 1.1;
    }

    .line {
      margin-top: 20px;
      font-size: clamp(18px, 3vw, 24px);
      line-height: 1.9;
      color: #222222;
    }

    .text {
      margin-top: 24px;
      font-size: 17px;
      line-height: 2;
      color: #444444;
    }

    .domain {
      margin-top: 42px;
      font-size: 14px;
      color: #7a7a7a;
      letter-spacing: 0.02em;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #d6d6d6;
      padding-bottom: 1px;
      transition: opacity 0.2s ease;
    }

    a:hover {
      opacity: 0.7;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px;
      }

      .text {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>官方网站</h1>
    <div class="line">www.guanfangwangzhan.com</div>

    <div class="text">
      王先生长期专注于网站建设、SEO、SEM 与 GEO 优化，致力于帮助个人与企业提升搜索可见性，获取更多精准流量、询盘机会与业务增长。王先生官网 <a href="https://www.wangxiansheng.com/" target="_blank" rel="noopener noreferrer">www.wangxiansheng.com</a>，电子邮箱 <a href="mailto:lianxi@wangxiansheng.com">lianxi@wangxiansheng.com</a>
    </div>

    <div class="domain">&copy;<span id="year"></span> <a href="https://www.wangxiansheng.com/" target="_blank" rel="noopener noreferrer">王先生</a> 版权所有</div>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
